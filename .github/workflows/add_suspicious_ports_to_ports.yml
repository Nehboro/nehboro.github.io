name: Update feeds/ports.csv from suspicious ports list

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-ports-feed:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch and merge suspicious ports into feeds/ports.csv
        run: |
          python - <<'PY'
          import csv
          import io
          import urllib.request
          from pathlib import Path

          REMOTE_URL = "https://raw.githubusercontent.com/mthcht/awesome-lists/refs/heads/main/Lists/suspicious_ports_list.csv"
          FEED_PATH = Path("feeds/ports.csv")

          DEFAULT_HEADER = [
              "# Nehboro suspicious ports feed",
              "# Format: port,protocol",
              "# Supports ranges: 8080-8085",
          ]

          def fetch_remote_csv(url: str):
              with urllib.request.urlopen(url) as resp:
                  content = resp.read().decode("utf-8-sig")
              return list(csv.DictReader(io.StringIO(content)))

          def load_existing_feed(path: Path):
              comments = []
              rows = []
              existing_ports = set()

              if not path.exists():
                  return DEFAULT_HEADER, rows, existing_ports

              with path.open("r", encoding="utf-8-sig", newline="") as f:
                  lines = f.read().splitlines()

              data_lines = []
              for line in lines:
                  if not line.strip():
                      continue
                  if line.startswith("#"):
                      comments.append(line)
                  else:
                      data_lines.append(line)

              if not comments:
                  comments = DEFAULT_HEADER

              if data_lines:
                  reader = csv.DictReader(io.StringIO("\n".join(data_lines)))
                  for row in reader:
                      port = (row.get("port") or "").strip()
                      protocol = (row.get("protocol") or "").strip()
                      if not port:
                          continue
                      rows.append({"port": port, "protocol": protocol})
                      existing_ports.add(port)

              return comments, rows, existing_ports

          remote_rows = fetch_remote_csv(REMOTE_URL)
          comments, existing_rows, existing_ports = load_existing_feed(FEED_PATH)

          added = 0
          for row in remote_rows:
              port = (row.get("dest_port") or "").strip()
              confidence = (row.get("metadata_confidence") or "").strip().lower()
              detection_type = (row.get("metadata_detection_type") or "").strip().lower()
              comment = (row.get("metadata_comment") or "").strip()

              if not port:
                  continue
              if confidence != "high":
                  continue
              if detection_type != "detection_rule":
                  continue
              if port in existing_ports:
                  continue

              existing_rows.append({
                  "port": port,
                  "protocol": comment
              })
              existing_ports.add(port)
              added += 1

          FEED_PATH.parent.mkdir(parents=True, exist_ok=True)

          def sort_key(row):
              port = row["port"]
              if "-" in port:
                  start = port.split("-", 1)[0]
              else:
                  start = port
              try:
                  return (0, int(start), port)
              except ValueError:
                  return (1, port, port)

          existing_rows.sort(key=sort_key)

          with FEED_PATH.open("w", encoding="utf-8", newline="") as f:
              for line in comments:
                  f.write(line.rstrip("\n") + "\n")

              writer = csv.DictWriter(f, fieldnames=["port", "protocol"])
              writer.writeheader()
              writer.writerows(existing_rows)

          print(f"Updated {FEED_PATH}")
          print(f"Added {added} new entries")
          print(f"Total entries: {len(existing_rows)}")
          PY

      - name: Show updated file
        run: |
          ls -la feeds
          echo "---- feeds/ports.csv ----"
          sed -n '1,40p' feeds/ports.csv

      - name: Commit and push if changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          git add feeds/ports.csv

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update feeds/ports.csv from suspicious ports list"
            git push
          fi
