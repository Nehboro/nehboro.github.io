name: Fetch community reports

on:
  schedule:
    # Every hour - pulls new reports from ntfy.sh/nehboro-reports
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch reports from ntfy.sh/nehboro-reports
        run: |
          mkdir -p reports
          SINCE=$(cat reports/.last_fetch 2>/dev/null || echo 0)
          NOW=$(date +%s)
          # Pull messages posted since last fetch (NDJSON format)
          curl -sSfL "https://ntfy.sh/nehboro-reports/json?poll=1&since=${SINCE}" \
            > reports/_latest.jsonl || true
          if [ -s reports/_latest.jsonl ]; then
            mv reports/_latest.jsonl "reports/${NOW}.jsonl"
            echo "Fetched $(wc -l < reports/${NOW}.jsonl) new reports"
          else
            rm -f reports/_latest.jsonl
            echo "No new reports"
          fi
          echo "$NOW" > reports/.last_fetch

      - name: Build aggregated reports.json index
        run: |
          # Parse raw ntfy dumps, DECODE the reversed-base64 body the addon sends,
          # and build a single aggregated reports/reports.json for the site.
          python3 - <<'PY'
          import json, os, glob, re, base64

          def decode_addon_body(raw):
              """
              The Nehboro browser extension encodes its report body as:
                  UTF-8 plaintext -> base64 -> reversed string
              The URL scanner sends plaintext markdown (no encoding).

              This function tries to decode; if decoding fails it returns the raw string,
              so plaintext scanner reports still pass through.
              """
              if not raw or not isinstance(raw, str):
                  return raw
              # Quick sanity: addon bodies are one long token of base64 chars + '='
              # (after reversing, padding '=' moves to start). No whitespace in them.
              stripped = raw.strip()
              if re.search(r'[\s\n]', stripped):
                  # Contains whitespace -> already plaintext (scanner report, manual ntfy post, etc.)
                  return raw
              # Unreverse
              try:
                  unreversed = stripped[::-1]
                  # Fix padding
                  missing = (-len(unreversed)) % 4
                  unreversed += '=' * missing
                  decoded_bytes = base64.b64decode(unreversed, validate=True)
                  decoded = decoded_bytes.decode('utf-8')
                  # Sanity: decoded should contain markdown-ish markers
                  if '**' in decoded or 'URL:' in decoded or 'Score:' in decoded:
                      return decoded
                  # Couldn't confirm - return raw to avoid corrupting unknown formats
                  return raw
              except Exception:
                  return raw

          out = []
          for f in sorted(glob.glob('reports/*.jsonl')):
              with open(f, encoding='utf-8') as fh:
                  for line in fh:
                      line = line.strip()
                      if not line:
                          continue
                      try:
                          msg = json.loads(line)
                      except Exception as e:
                          print('skip malformed line:', e)
                          continue
                      raw_body = msg.get('message', '')
                      body = decode_addon_body(raw_body)
                      url_m   = re.search(r'\*\*URL:\*\*\s*`([^`]+)`', body)
                      host_m  = re.search(r'\*\*Host:\*\*\s*`([^`]+)`', body)
                      score_m = re.search(r'\*\*Score:\*\*\s*(\d+)', body)
                      out.append({
                          'id':    msg.get('id'),
                          'time':  msg.get('time'),
                          'title': msg.get('title', ''),
                          'tags':  msg.get('tags', []),
                          'url':   url_m.group(1)   if url_m   else None,
                          'host':  host_m.group(1)  if host_m  else None,
                          'score': int(score_m.group(1)) if score_m else None,
                          'body':  body,
                      })
          out.sort(key=lambda x: x.get('time', 0), reverse=True)
          with open('reports/reports.json', 'w', encoding='utf-8') as f:
              json.dump(out, f, ensure_ascii=False, indent=2)
          print('Aggregated', len(out), 'reports into reports.json')
          PY

      - name: Commit if changed
        run: |
          git config user.name "nehboro-bot"
          git config user.email "bot@users.noreply.github.com"
          git add reports/
          git diff --cached --quiet || git commit -m "chore: fetch community reports"
          git push || true
